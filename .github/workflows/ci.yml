name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (anti-leak)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # NOTA: el job de Rust se activa cuando exista src-tauri/Cargo.toml.
  # Por ahora queda como placeholder (skip si no hay codigo todavia).
  rust-checks:
    name: Rust fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check if Rust project exists
        id: has_rust
        run: |
          if [ -f src-tauri/Cargo.toml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::sin src-tauri/Cargo.toml todavia — se omite. Aparece al completar la Fase 1."
          fi
      - name: Install Rust toolchain
        if: steps.has_rust.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Tauri system deps (Linux)
        if: steps.has_rust.outputs.exists == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Cache cargo
        if: steps.has_rust.outputs.exists == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo fmt
        if: steps.has_rust.outputs.exists == 'true'
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      - name: cargo clippy
        if: steps.has_rust.outputs.exists == 'true'
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        if: steps.has_rust.outputs.exists == 'true'
        working-directory: src-tauri
        run: cargo test
