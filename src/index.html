<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jam-drop</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>jam-drop</h1>
        <p class="subtitle">drag-and-drop entre tus equipos, sobre tu propia malla</p>
        <p id="me-line" class="muted small">cargando identidad...</p>
      </header>

      <section class="card">
        <div class="card-head">
          <h2>Equipos en la malla</h2>
          <button id="refresh-peers" type="button" class="ghost">↻ Refrescar</button>
        </div>
        <p id="peers-status" class="muted small">— sin escanear todavía —</p>
        <ul id="peers-list"></ul>
        <p id="peers-empty-hint" class="muted small hidden">
          Sin peers configurados. Editá
          <code id="peers-file-link">peers.toml</code> y volvé a refrescar.
        </p>
      </section>

      <section class="card">
        <h2>Enviar archivo</h2>
        <form id="send-form">
          <label class="field">
            <span>Archivo</span>
            <input type="file" id="file-input" required />
          </label>
          <label class="field">
            <span>Destino</span>
            <select id="dest-select" required>
              <option value="">— elegí un equipo vivo —</option>
            </select>
          </label>
          <button id="send-btn" type="submit">Enviar</button>
          <p id="send-status" class="muted small"></p>
        </form>
      </section>

      <footer>
        <p>
          jam-drop · MVP ·
          <a href="https://github.com/c0hete/jam-drop" target="_blank" rel="noreferrer">
            código en GitHub
          </a>
        </p>
      </footer>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
